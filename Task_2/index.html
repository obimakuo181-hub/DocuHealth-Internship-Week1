<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Appointment Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Patient Appointment Dashboard</h1>
    <div class="controls">
      <label for="search" class="visually-hidden">Search Patients by Name</label>
      <input type="text" id="search" placeholder="Search by name" aria-label="Search Patients by Name" />

      <label for="statusFilter" class="visually-hidden">Filter by Status</label>
      <select id="statusFilter" aria-label="Filter by Status">
        <option value="All">All Status</option>
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>
      </select>

      <button id="sortBtn" aria-label="Sort patients by last visit date">Sort: Newest First</button>
    </div>
  </header>

  <main>
    <section id="patientList" class="patient-list" aria-live="polite">
      <!-- Patient cards will render here -->
    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
